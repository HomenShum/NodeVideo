name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Lint, types, unit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install FFmpeg worker tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Verify worker receipt and capability schemas
        run: |
          npm run capability:validate
          npm run worker:verify

      - name: Primitive-first UI policy and budgets
        run: |
          node scripts/quality/check-ui-policy.mjs
          node scripts/quality/check-ui-budget.mjs

      - name: Production build
        run: npm run build

  ui-ux-qa:
    name: Agentic UI Bar — public synthetic path
    needs: code-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build the release shell
        run: npm run build

      - name: Run synthetic-only browser gates
        run: npm run test:e2e

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodevideo-playwright-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
