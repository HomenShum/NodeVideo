name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  VITE_NODEVIDEO_V2_MANIFEST_SHA256: 04f02098045273f5acf587bbbe177cd25664d474c68e32691b4ab8de45060cd2
  VITE_NODEVIDEO_BLIND_MANIFEST_SHA256: bad6578386c2e9dff1cf6eacbbb3973d67c462c6b8422f0d810168912c192953
  VITE_NODEVIDEO_SONG_MANIFEST_SHA256: ae91d3f427b016f6cd15a08ff5e20c9028150b3545eddc90e9dcf0a35b09047c
  VITE_NODEVIDEO_REAL_CALIBRATION_MANIFEST_SHA256: 7f149bae3e6378f8adeca65fd97699fecdb839eb840b56f7c16c29760db48133

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Lint, types, unit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Block new oversized media
        run: npm run check:bloat
        env:
          NODEVIDEO_BLOAT_BASE: origin/${{ github.base_ref || 'main' }}

      - name: Install FFmpeg worker tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Verify worker receipt and capability schemas
        run: |
          npm run capability:validate
          npm run grounding:doctor
          npm run worker:verify
          npm run worker:song:verify
          npm run proof:song:real:verify
          npm run worker:authorized:verify

      - name: Primitive-first UI policy and budgets
        run: |
          node scripts/quality/check-ui-policy.mjs
          node scripts/quality/check-ui-budget.mjs

      - name: Production build
        run: npm run build

      - name: UI contract (agent-native surface guarantee)
        run: |
          npx playwright install --with-deps chromium
          npm run check:contract

  ui-ux-qa:
    name: Agentic UI Bar — authorized real-media path
    needs: code-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      VITE_CONVEX_URL: ${{ vars.NODEVIDEO_CONVEX_URL }}
      NODEVIDEO_CONVEX_URL: ${{ vars.NODEVIDEO_CONVEX_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build the release shell
        run: npm run build

      - name: Run authorized real-media browser gates
        run: npm run test:e2e

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodevideo-playwright-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
