schemaVersion: nodekit.repo/v1
repository: HomenShum/NodeVideo
lifecycle: preview
support: active
role: domain-application
commandProfile: application

canonicalFor:
  - nodevideo.worker-receipt

consumes:
  - nodeplatform.repo-contract
  - nodeplatform.environment
  - nodeagent.agent-run
  - nodeagent.policy-context
  - nodeagent.proposal-review
  - nodeagent.trace-workpaper
  - nodetrace.trace-ui-store
  - proofloop.certification
  - agentic-ui-qa.flight-recorder

commands:
  dev: { script: dev, mode: service }
  demo: { script: demo, mode: service }
  doctor: { script: doctor, mode: finite }
  check: { script: check, mode: finite }
  proof: { script: proof, mode: finite }

noKey:
  status: certified
  command: npm run demo
  externalAccountsRequired: 0
  disclosure: The public path uses deterministic song-conditioned replay artifacts and independently verified owner-authorized picture-only calibration evidence; no model, GPU, provider, or cloud account is required.

environment:
  contractVersion: nodeplatform.env/v1
  status: migration-planned

proof:
  command: npm run proof
  receiptSchema: nodevideo.worker-receipt.v1

contractDeclarations: []
architectureExceptions: []
